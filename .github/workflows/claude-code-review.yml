name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request and post your feedback as a PR comment. Focus on:
            - Bugs or logic errors
            - Security vulnerabilities
            - SwiftLint violations (force unwrapping, force try, line length, etc.)
            - Architecture violations (MVVM/UseCase separation, DependencyContainer usage)
            - Performance issues
            - Missing error handling at system boundaries

            Be concise and actionable. Skip trivial style nits.
